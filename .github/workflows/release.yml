name: Release Electron

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - run: npm ci

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version
        working-directory: ./apps/web

      - name: Build web + Electron
        run: npm run build:electron
        working-directory: ./apps/web
        env:
          VITE_APP_ENV: production
          VITE_ELECTRON_BUILD: true

      - name: Build and publish
        run: npx electron-builder --x64 --publish always
        working-directory: ./apps/web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
