name: Release Electron

# =============================================================================
# Release Electron desktop + Android APK
#
# Triggers:
#   - tag v*            (e.g. v0.2.0)
#   - workflow_dispatch (manual, con input version)
#
# Salidas:
#   - Binarios Electron (Windows installer/portable, macOS Intel/ARM, Linux AppImage/deb)
#   - APK Android (debug, uploaded a GitHub Release)
#   - Subidos a GitHub Releases automáticamente
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - run: pnpm install --frozen-lockfile

      - name: Update package.json version
        run: pnpm pkg set version=${{ steps.version.outputs.value }}
        working-directory: ./apps/web

      - name: Build web + Electron
        run: pnpm run build:electron
        working-directory: ./apps/web
        env:
          VITE_APP_ENV: production
          VITE_ELECTRON_BUILD: true

      - name: Build and publish
        run: npx electron-builder --x64 --publish always
        working-directory: ./apps/web
        env:
          VITE_APP_ENV: production
          VITE_ELECTRON_BUILD: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Twilio (runtime, no build-time — optional)
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}

          # =========================================================================
          # Code signing (OPCIONAL — sólo se usan si los secrets están configurados)
          # =========================================================================
          # Windows (.pfx) — exporta el certificado con su private key
          # CSC_LINK: base64 del .pfx (cat cert.pfx | base64 -w 0)
          # CSC_KEY_PASSWORD: contraseña del certificado
          # CSC_IDENTITY_AUTO_DISCOVERY=true (default) — busca en keychain/cert store
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # macOS notarization
          # APPLE_ID: tu Apple ID
          # APPLE_APP_SPECIFIC_PASSWORD: app-specific password de appleid.apple.com
          # APPLE_TEAM_ID: 10-char team ID de App Store Connect
          # APPLE_IDENTITY: "Developer ID Application: Your Name (TEAMID)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-android-apk:
    name: Build Android APK
    needs: [release]
    # continue-on-error: si falla, no rompe el release de Electron
    # (los binarios desktop ya se subieron al release).
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm run build
        working-directory: ./apps/web
        env:
          VITE_APP_ENV: production

      - name: Sync web to Capacitor Android
        # `cap sync` copia el contenido de `dist/` a `android/app/src/main/assets/public/`
        # y actualiza plugins. Como `android/` ya está en el repo (generado
        # por `cap add android`), no necesitamos re-crearlo.
        run: pnpm exec cap sync android
        working-directory: ./apps/web

      - name: Compute versionCode
        id: vcode
        shell: bash
        run: |
          # versionCode = epoch seconds (sirve como número de build incremental)
          # versionName viene del tag v0.2.0 → "0.2.0"
          echo "value=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            -PversionCode=${{ steps.vcode.outputs.value }} \
            -PversionName=${{ steps.version.outputs.value }} \
            --no-daemon
        working-directory: ./apps/web

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             ChordShift-${{ steps.version.outputs.value }}.apk
        working-directory: ./apps/web

      - name: Upload APK to Release
        run: |
          gh release upload v${{ steps.version.outputs.value }} \
            ./apps/web/ChordShift-${{ steps.version.outputs.value }}.apk \
            --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
