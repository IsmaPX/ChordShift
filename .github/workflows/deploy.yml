name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        # `pnpm --filter=web build` ejecuta el script `build` de apps/web
        # (`tsc -b && vite build`) sin construir las dependencias transitivas.
        # Esto es más rápido y menos propenso a OOM que `turbo build --filter=web`.
        run: pnpm --filter=web build
        env:
          VITE_APP_ENV: production
          # Limita el heap de Node para evitar OOM en Vercel (8GB disponibles).
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: ./apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
