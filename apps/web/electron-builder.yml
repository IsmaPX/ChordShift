appId: com.chordshift.app
productName: Worship Piano
copyright: Copyright © 2026 IsmaPX
electronVersion: 33.0.0

directories:
  output: release
  buildResources: resources

asar: false

extraMetadata:
  type: commonjs

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - resources/icon.png

protocols:
  - name: Worship Piano
    schemes: [worship-piano]

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64, arm64]
  icon: resources/icon.png
  # Code signing: si CSC_LINK + CSC_KEY_PASSWORD están en env, electron-builder
  # firma automáticamente. Si no, los binarios quedan sin firmar y
  # SmartScreen mostrará warning al usuario.
  # Para firmar: subir el .pfx a GitHub Secrets como CSC_LINK (base64) y
  # CSC_KEY_PASSWORD (contraseña del certificado).
  signAndEditExecutable: true
  publisherName: IsmaPX
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.png
  # Notarization automática si APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD y
  # APPLE_TEAM_ID están en env. Sin esto, GateKeeper bloquea la app.
  hardenedRuntime: true
  gatekeeperAssess: false
  category: public.app-category.music
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: Worship Piano
