appId: com.chordshift.app
productName: Worship Piano
copyright: Copyright © 2026 IsmaPX
electronVersion: 33.0.0

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: ../../node_modules/twilio
    to: node_modules/twilio
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
  sign: false
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift
      draft: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.png
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift
      draft: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift
      draft: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
