appId: com.chordshift.app
productName: Worship Piano
copyright: Copyright © 2026 IsmaPX
electronVersion: 33.0.0

directories:
  output: release
  buildResources: resources

asar: false

extraMetadata:
  type: commonjs

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - resources/icon.png

extraResources:
  - from: ../../node_modules/twilio
    to: node_modules/twilio
    filter:
      - "**/*"

protocols:
  - name: Worship Piano
    schemes: [worship-piano]

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64, arm64]
  icon: resources/icon.png
  sign: false
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.png
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  publish:
    - provider: github
      owner: IsmaPX
      repo: ChordShift

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: Worship Piano
