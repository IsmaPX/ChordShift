# =============================================================================
# fly.toml — ChordShift API
# https://fly.io/docs/reference/configuration/
#
# Para usar:
#   1. Instala flyctl: https://fly.io/docs/hands-on/install-flyctl/
#   2. fly auth signup
#   3. fly launch --copy-config --name chordshift-api
#   4. fly postgres create --name chordshift-pg
#   5. fly postgres attach chordshift-pg
#   6. fly secrets set JWT_SECRET=... CORS_ORIGIN=... VAPID_PUBLIC_KEY=... VAPID_PRIVATE_KEY=...
#   7. fly deploy
# =============================================================================

app = "chordshift-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  # Migraciones Prisma antes de levantar la nueva versión
  release_command = "node node_modules/.pnpm/@prisma+client*/node_modules/@prisma/client/scripts/migrate-deploy.js || pnpm prisma:deploy"
  # O usar un script JS simple:
  # release_command = "cd apps/api && npx prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/api/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
